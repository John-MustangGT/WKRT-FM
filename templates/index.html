<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WKRT-FM 104.7 — The Home of Classic Rock</title>
<style>
  :root {
    --bg:      #0d0d0d;
    --card:    #181818;
    --border:  #2a2a2a;
    --accent:  #e85d04;
    --accent2: #f48c06;
    --text:    #e8e8e8;
    --dim:     #777;
    --green:   #4caf50;
    --red:     #ff4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  .wrap { max-width: 900px; margin: 0 auto; padding: 0 16px; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 0 18px;
    border-bottom: 1px solid var(--border);
  }
  .logo-call {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }
  .logo-tag {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #200;
    color: var(--red);
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 2px;
    padding: 5px 11px;
    border-radius: 4px;
    border: 1px solid #ff444430;
  }
  .live-pill .dot {
    width: 7px; height: 7px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  #listener-count { color: var(--dim); font-size: 0.85rem; }

  /* ── Player ── */
  .player-bar {
    margin: 20px 0 0;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }
  .play-btn {
    flex-shrink: 0;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .play-btn:hover { background: var(--accent2); }
  .play-btn svg { pointer-events: none; }
  .player-info { flex: 1; min-width: 0; }
  .player-track {
    font-weight: 600;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-label { font-size: 0.72rem; color: var(--dim); margin-top: 2px; }
  .volume-wrap { display: flex; align-items: center; gap: 8px; }
  .volume-wrap svg { color: var(--dim); flex-shrink: 0; }
  input[type=range] {
    -webkit-appearance: none;
    width: 80px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 14px;
  }
  @media (max-width: 620px) { .grid { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card-full { grid-column: 1 / -1; }
  .card-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── Now playing ── */
  .np-artist { font-size: 1.45rem; font-weight: 700; line-height: 1.2; }
  .np-title  { font-size: 1rem; color: var(--dim); margin-top: 5px; }
  .np-album  { font-size: 0.78rem; color: #555; margin-top: 4px; }
  .np-year {
    display: inline-block;
    margin-top: 10px;
    background: #222;
    color: var(--accent2);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 11px;
    border-radius: 20px;
  }
  .np-next {
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--dim);
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .np-next span { color: #aaa; }

  /* ── DJ ── */
  .dj-quote {
    font-style: italic;
    color: #ccc;
    line-height: 1.65;
    font-size: 0.93rem;
    border-left: 3px solid var(--accent);
    padding-left: 14px;
  }
  .dj-empty { color: var(--dim); font-style: italic; font-size: 0.85rem; }

  /* ── Recent tracks ── */
  .track-list { list-style: none; }
  .track-list li {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.86rem;
    gap: 8px;
  }
  .track-list li:last-child { border-bottom: none; }
  .tl-left { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tl-artist { font-weight: 600; }
  .tl-title  { color: var(--dim); }
  .tl-year   { color: var(--accent2); font-size: 0.72rem; flex-shrink: 0; }

  /* ── Track detail panel ── */
  .panel-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 199; display: none; cursor: pointer;
  }
  .panel-overlay.open { display: block; }
  .track-panel {
    position: fixed; top: 0; right: -500px;
    width: 460px; max-width: 100vw; height: 100vh;
    background: #141414; border-left: 1px solid var(--border);
    z-index: 200; overflow-y: auto;
    transition: right 0.25s ease;
  }
  .track-panel.open { right: 0; }
  .panel-hdr {
    position: sticky; top: 0; background: #141414;
    border-bottom: 1px solid var(--border);
    padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-close {
    background: none; border: none; color: var(--dim);
    font-size: 1.1rem; cursor: pointer; padding: 4px 8px;
  }
  .panel-close:hover { color: var(--text); }
  .panel-art { width: 100%; max-height: 220px; object-fit: cover; display: block; }
  .panel-art-ph {
    width: 100%; height: 110px;
    background: linear-gradient(135deg, #1a0900, #111);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: var(--border);
  }
  .panel-title-block { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .panel-track-name  { font-size: 1.05rem; font-weight: 700; margin-bottom: 3px; }
  .panel-track-sub   { font-size: 0.82rem; color: var(--accent2); }
  .panel-track-year  { font-size: 0.75rem; color: var(--dim); margin-top: 2px; }
  .panel-sec { padding: 13px 16px; border-bottom: 1px solid var(--border); }
  .panel-sec-label {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 2.5px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 9px;
  }
  .panel-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 0.81rem; margin-bottom: 5px;
  }
  .panel-row:last-child { margin-bottom: 0; }
  .panel-row-k { color: var(--dim); flex-shrink: 0; margin-right: 12px; }
  .panel-row-v { color: var(--text); text-align: right; word-break: break-word; }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .panel-tag {
    font-size: 0.68rem; padding: 2px 8px; border-radius: 10px;
    background: #1a0900; border: 1px solid #f48c0630; color: var(--accent2);
  }
  .hist-dj { margin-bottom: 12px; }
  .hist-dj:last-child { margin-bottom: 0; }
  .hist-dj-name {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 1px;
    color: var(--accent2); text-transform: uppercase; margin-bottom: 5px;
  }
  .hist-slots { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
  .hist-slot {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 4px;
    background: #111; border: 1px solid var(--border); color: var(--dim);
  }
  .hist-slot strong { color: var(--text); }
  .hist-play { font-size: 0.75rem; color: var(--dim); padding: 1px 0; }
  .track-link { cursor: pointer; }
  .track-link:hover { color: var(--accent2); }
  .no-hist { color: var(--dim); font-style: italic; font-size: 0.82rem; }

  /* ── Tune In ── */
  .tune-in-list { list-style: none; }
  .tune-in-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .tune-in-item:last-child { border-bottom: none; }
  .tune-in-name {
    font-weight: 600;
    min-width: 80px;
    flex-shrink: 0;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tune-in-url {
    flex: 1;
    color: #4a9eff;
    font-size: 0.78rem;
    word-break: break-all;
    font-family: monospace;
    min-width: 0;
  }
  .tune-in-codec {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .codec-mp3  { background: #1a1200; color: #f48c06; border: 1px solid #f48c0630; }
  .codec-opus { background: #001a0d; color: #4caf50; border: 1px solid #4caf5030; }
  .codec-aac  { background: #00101a; color: #4a9eff; border: 1px solid #4a9eff30; }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 0.68rem;
    cursor: pointer;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  /* ── Footer status ── */
  .status-bar {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--dim);
    flex-wrap: wrap;
  }
  .status-bar span { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="logo-call">WKRT · 104.7</div>
      <div class="logo-tag">The Home of Classic Rock</div>
    </div>
    <div class="header-right">
      <a href="/admin" style="color:var(--dim);font-size:0.75rem;text-decoration:none;letter-spacing:1px;padding:5px 10px;border:1px solid var(--border);border-radius:4px;">ADMIN</a>
      <div class="live-pill"><div class="dot"></div>LIVE</div>
      <div id="listener-count">— listeners</div>
    </div>
  </header>

  <!-- Custom player bar -->
  <div class="player-bar">
    <button class="play-btn" id="play-btn" onclick="togglePlay()" title="Play / Pause">
      <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <div class="player-info">
      <div class="player-track" id="player-track">Click play to start streaming</div>
      <div class="player-label">WKRT-FM 104.7 · Live Stream</div>
    </div>
    <div class="volume-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
    </div>
  </div>

  <div class="grid">

    <!-- Now playing -->
    <div class="card card-full">
      <div class="card-label">Now Playing</div>
      <div id="now-playing">
        <div style="color:var(--dim);font-style:italic">Connecting to stream...</div>
      </div>
    </div>

    <!-- DJ -->
    <div class="card">
      <div class="card-label" id="dj-label">On Air</div>
      <div id="dj-section">
        <div class="dj-empty">Waiting for the DJ...</div>
      </div>
    </div>

    <!-- Recent tracks -->
    <div class="card">
      <div class="card-label">Recently Played</div>
      <ul class="track-list" id="recent-tracks">
        <li style="color:var(--dim);font-style:italic;font-size:.85rem;border:none">Nothing yet</li>
      </ul>
    </div>

  </div>

  <!-- Tune In -->
  <div class="card" style="margin-top:14px">
    <div class="card-label">Tune In</div>
    <ul class="tune-in-list" id="tune-in-list">
      <li style="color:var(--dim);font-style:italic;font-size:.82rem">Loading streams…</li>
    </ul>
  </div>

  <div class="status-bar">
    <div>Engine: <span id="cache-state">—</span></div>
    <div>On air since: <span id="uptime">—</span></div>
  </div>

</div>

<!-- Hidden HTML5 audio element -->
<audio id="audio" preload="none"></audio>

<div class="panel-overlay" id="panel-overlay" onclick="closeTrackPanel()"></div>
<div class="track-panel" id="track-panel">
  <div class="panel-hdr">
    <span style="font-size:.6rem;font-weight:700;letter-spacing:2.5px;color:var(--accent)">TRACK DETAIL</span>
    <button class="panel-close" onclick="closeTrackPanel()">✕</button>
  </div>
  <div id="track-panel-body"></div>
</div>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  let streamUrl = '';
  let playing = false;
  let lastDjScript = '';
  let streamReady = false;

  const PLAY_SVG  = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

  function togglePlay() {
    if (!streamUrl) return;
    if (playing) {
      audio.pause();
      audio.src = '';   // fully stop buffering
      playing = false;
      playIcon.innerHTML = PLAY_SVG;
    } else {
      audio.src = streamUrl;
      audio.volume = parseFloat(document.getElementById('volume').value);
      audio.play().catch(() => {});
      playing = true;
      playIcon.innerHTML = PAUSE_SVG;
    }
  }

  function setVolume(v) {
    audio.volume = parseFloat(v);
  }

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    } catch(e) { return iso; }
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function refresh() {
    let d;
    try {
      const r = await fetch('/api/status');
      d = await r.json();
    } catch(e) { return; }

    // Build stream URL using the browser's hostname so it works
    // regardless of whether the server uses "localhost" internally.
    if (!streamReady && d.stream_port && d.stream_mount) {
      streamUrl = `http://${window.location.hostname}:${d.stream_port}${d.stream_mount}`;
      streamReady = true;
    }

    // Listener count
    const lc = d.listener_count || 0;
    document.getElementById('listener-count').textContent =
      lc === 1 ? '1 listener' : lc + ' listeners';

    // Now playing
    const npEl = document.getElementById('now-playing');
    if (d.current_track) {
      const t = d.current_track;
      const album = t.album ? `<div class="np-album">${esc(t.album)}</div>` : '';
      const next = d.next_track
        ? `<div class="np-next">Up next:
            <span class="track-link" data-artist="${esc(d.next_track.artist)}" data-title="${esc(d.next_track.title)}" data-year="${d.next_track.year}">
              ${esc(d.next_track.artist)} — ${esc(d.next_track.title)}
            </span></div>`
        : '';
      npEl.innerHTML =
        `<div class="np-artist track-link" data-artist="${esc(t.artist)}" data-title="${esc(t.title)}" data-year="${t.year}">${esc(t.artist)}</div>
         <div class="np-title track-link"  data-artist="${esc(t.artist)}" data-title="${esc(t.title)}" data-year="${t.year}">${esc(t.title)}</div>
         ${album}
         <span class="np-year">${t.year}</span>
         ${next}`;
      document.getElementById('player-track').textContent =
        t.artist + ' — ' + t.title;
    }

    // DJ label
    if (d.current_dj) {
      const override = d.dj_override ? ' ★' : '';
      document.getElementById('dj-label').textContent = `DJ ${d.current_dj.toUpperCase()}${override}`;
    }

    // DJ script
    if (d.last_dj_script && d.last_dj_script !== lastDjScript) {
      lastDjScript = d.last_dj_script;
      document.getElementById('dj-section').innerHTML =
        `<div class="dj-quote">${esc(d.last_dj_script)}</div>`;
    }

    // Recent tracks
    if (d.recent_tracks && d.recent_tracks.length) {
      document.getElementById('recent-tracks').innerHTML =
        d.recent_tracks.map(t =>
          `<li class="track-link" data-artist="${esc(t.artist)}" data-title="${esc(t.title)}" data-year="${t.year}">
            <span class="tl-left">
              <span class="tl-artist">${esc(t.artist)}</span>
              <span class="tl-title"> — ${esc(t.title)}</span>
            </span>
            <span class="tl-year">${t.year}</span>
          </li>`
        ).join('');
    }

    // Status
    document.getElementById('cache-state').textContent = d.cache_state || '—';
    document.getElementById('uptime').textContent = fmtDate(d.started_at);
  }

  refresh();
  setInterval(refresh, 4000);

  // ── Tune In ───────────────────────────────────────────────────────────────
  async function loadStreams() {
    let streams;
    try {
      streams = await fetch('/api/streams').then(r => r.json());
    } catch(e) { return; }

    const el = document.getElementById('tune-in-list');
    if (!streams.length) {
      el.innerHTML = '<li style="color:var(--dim);font-style:italic;font-size:.82rem">No active streams configured</li>';
      return;
    }

    el.innerHTML = streams.map(s => {
      // Substitute localhost/127.0.0.1 with the browser host so external
      // listeners get a URL that works from their machine too.
      const host = (s.host === 'localhost' || s.host === '127.0.0.1')
        ? window.location.hostname : s.host;
      const url = `http://${host}:${s.port}${s.mount}`;
      const codec = s.codec || 'mp3';
      const codecClass = codec === 'opus' ? 'codec-opus' : codec === 'aac' ? 'codec-aac' : 'codec-mp3';
      return `<li class="tune-in-item">
        <span class="tune-in-name">${esc(s.name)}</span>
        <a class="tune-in-url" href="${esc(url)}" target="_blank">${esc(url)}</a>
        <span class="tune-in-codec ${codecClass}">${esc(codec)}</span>
        <button class="copy-btn" onclick="copyUrl(this,'${esc(url)}')">COPY</button>
      </li>`;
    }).join('');
  }

  function copyUrl(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = 'COPIED';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1800);
    }).catch(() => {
      // Fallback for non-HTTPS contexts
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = 'COPIED'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1800);
    });
  }

  loadStreams();

  // ── Track detail panel ────────────────────────────────────────────────────
  document.addEventListener('click', e => {
    const el = e.target.closest('.track-link[data-artist]');
    if (el) openTrackPanel(el.dataset.artist, el.dataset.title, parseInt(el.dataset.year, 10));
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrackPanel(); });

  function openTrackPanel(artist, title, year) {
    document.getElementById('panel-overlay').classList.add('open');
    document.getElementById('track-panel').classList.add('open');
    document.getElementById('track-panel-body').innerHTML =
      '<div style="padding:40px 16px;text-align:center;color:var(--dim)">Loading…</div>';
    loadTrackDetail(artist, title, year);
  }

  function closeTrackPanel() {
    document.getElementById('panel-overlay').classList.remove('open');
    document.getElementById('track-panel').classList.remove('open');
  }

  async function loadTrackDetail(artist, title, year) {
    try {
      const params = new URLSearchParams({ artist, title });
      const d = await fetch(`/api/track?${params}`).then(r => r.json());
      renderTrackDetail(d);
    } catch(e) {
      document.getElementById('track-panel-body').innerHTML =
        '<div style="padding:20px;color:#ff4444">Failed to load track data.</div>';
    }
  }

  function _timeAgo(isoStr) {
    if (!isoStr) return '—';
    const secs = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (secs < 60)    return 'just now';
    if (secs < 3600)  return Math.floor(secs / 60) + 'm ago';
    if (secs < 86400) {
      const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
      return m ? `${h}h ${m}m ago` : `${h}h ago`;
    }
    return Math.floor(secs / 86400) + 'd ago';
  }

  function fmtDuration(s) {
    s = Math.round(s);
    const m = Math.floor(s / 60), sec = s % 60;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function renderTrackDetail(d) {
    const ann  = d.annotation || {};
    const id3  = d.id3        || {};
    const hist = d.history    || { total_plays: 0, djs: {} };

    let artHtml = '<div class="panel-art-ph">♪</div>';
    if (d.album_art && d.album_art.source === 'id3') {
      artHtml = `<img class="panel-art" src="data:${d.album_art.mime};base64,${d.album_art.data}" alt="">`;
    } else if (d.album_art && d.album_art.url) {
      artHtml = `<img class="panel-art" src="${esc(d.album_art.url)}" alt=""
        onerror="this.parentNode.innerHTML='<div class=panel-art-ph>♪</div>'">`;
    }

    const infoRows = [
      ['Album',    id3.album      || ann.album || ''],
      ['Genre',    id3.genre      || ''],
      ['Duration', id3.duration_seconds ? fmtDuration(id3.duration_seconds) : ''],
    ].filter(([,v]) => v);

    const mbRows = [
      ['Label',    esc(ann.label        || '')],
      ['Released', esc(ann.release_year || '')],
    ].filter(([,v]) => v);
    const mbidHtml = ann.mbid
      ? `<div class="panel-row"><span class="panel-row-k">MBID</span>
           <span class="panel-row-v"><a href="https://musicbrainz.org/recording/${ann.mbid}"
             target="_blank" style="color:#4a9eff;font-size:.72rem">${ann.mbid.slice(0,8)}…</a></span></div>`
      : '';
    const tagsHtml = (ann.tags||[]).length
      ? `<div class="panel-tags">${ann.tags.map(t=>`<span class="panel-tag">${esc(t)}</span>`).join('')}</div>`
      : '';

    const SLOTS = ['morning','midday','afternoon','evening','night'];
    const djNames = Object.keys(hist.djs || {});
    let histInner = '';
    if (!hist.total_plays) {
      histInner = '<div class="no-hist">No plays recorded yet</div>';
    } else {
      histInner = `<div style="font-size:.82rem;margin-bottom:10px">Total plays: <strong>${hist.total_plays}</strong></div>`;
      for (const name of djNames) {
        const dj = hist.djs[name];
        const slotBits = SLOTS.filter(s=>dj.by_slot[s])
          .map(s=>`<span class="hist-slot"><strong>${dj.by_slot[s]}</strong> ${s}</span>`).join('');
        const playBits = (dj.last_played||[])
          .map(p=>`<div class="hist-play">${_timeAgo(p.at)} · ${p.slot}</div>`).join('');
        histInner += `<div class="hist-dj">
          <div class="hist-dj-name">${esc(name)} — ${dj.total} play${dj.total!==1?'s':''}</div>
          ${slotBits?`<div class="hist-slots">${slotBits}</div>`:''}
          <div>${playBits}</div>
        </div>`;
      }
    }

    document.getElementById('track-panel-body').innerHTML = `
      ${artHtml}
      <div class="panel-title-block">
        <div class="panel-track-name">${esc(d.title)}</div>
        <div class="panel-track-sub">${esc(d.artist)}</div>
        ${d.year ? `<div class="panel-track-year">${d.year}</div>` : ''}
      </div>
      ${infoRows.length ? `<div class="panel-sec">
        <div class="panel-sec-label">File Info</div>
        ${infoRows.map(([k,v])=>`<div class="panel-row">
          <span class="panel-row-k">${k}</span>
          <span class="panel-row-v">${esc(String(v))}</span>
        </div>`).join('')}
      </div>` : ''}
      ${(mbRows.length||mbidHtml||tagsHtml) ? `<div class="panel-sec">
        <div class="panel-sec-label">MusicBrainz</div>
        ${mbRows.map(([k,v])=>`<div class="panel-row">
          <span class="panel-row-k">${k}</span><span class="panel-row-v">${v}</span>
        </div>`).join('')}
        ${mbidHtml}${tagsHtml}
      </div>` : ''}
      <div class="panel-sec">
        <div class="panel-sec-label">Play History</div>
        ${histInner}
      </div>`;
  }
</script>
</body>
</html>
